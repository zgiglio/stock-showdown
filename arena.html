  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: max(12px, env(safe-area-inset-top)) 12px 40px;
    max-width: 760px; margin: 0 auto;
  }
  h1 { font-size: 22px; text-align: center; margin: 10px 0 2px; letter-spacing: .3px; }
  .sub { text-align: center; color: var(--dim); font-size: 13px; margin-bottom: 16px; }
  .vs { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: stretch; }
  .fighter {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 14px 12px; text-align: center; position: relative;
  }
  .fighter.leader { border-color: var(--gold); box-shadow: 0 0 18px rgba(255,210,74,.18); }
  .crown { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); font-size: 18px; display: none; }
  .fighter.leader .crown { display: block; }
  .who { font-size: 13px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; }
  .who.zach { color: var(--zach); } .who.claude { color: var(--claude); }
  .ret { font-size: 30px; font-weight: 800; margin: 6px 0 2px; font-variant-numeric: tabular-nums; }
  .val { color: var(--dim); font-size: 13px; font-variant-numeric: tabular-nums; }
  .day { font-size: 12px; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .mid { display: flex; align-items: center; font-weight: 800; color: var(--dim); font-size: 14px; }
  .up { color: var(--green); } .down { color: var(--red); }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 14px; margin-top: 14px; }
  .card h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin-bottom: 10px; }
  canvas { width: 100%; height: 120px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; font-variant-numeric: tabular-nums; }
  th { color: var(--dim); text-align: right; font-weight: 500; padding: 4px 6px; border-bottom: 1px solid var(--line); }
  td { text-align: right; padding: 5px 6px; border-bottom: 1px solid rgba(35,44,66,.5); }
  th:first-child, td:first-child { text-align: left; }
  .sym { font-weight: 700; }
  .more { color: var(--dim); font-size: 12px; text-align: center; padding: 8px 0 0; cursor: pointer; user-select: none; }
  .trade { border-left: 3px solid var(--claude); padding: 6px 10px; margin: 8px 0; background: var(--card2); border-radius: 0 10px 10px 0; }
  .trade .h { font-size: 13px; font-weight: 700; }
  .trade .r { font-size: 12px; color: var(--dim); margin-top: 2px; }
  .buy { color: var(--green); } .sell { color: var(--red); }
  .foot { text-align: center; color: var(--dim); font-size: 11px; margin-top: 18px; }
</style>

<script>
const $ = id => document.getElementById(id);
const fmt$ = n => '$' + n.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
const pct = n => (n >= 0 ? '+' : '') + n.toFixed(2) + '%';

async function load() {
  if (window.__DATA__) return window.__DATA__;
  const [snapshot, trades, history] = await Promise.all(
    ['data/snapshot.json', 'data/trades.json', 'data/history.json']
      .map(u => fetch(u + '?t=' + Date.now()).then(r => r.json())));
  return { snapshot, trades, history };
}

function fighter(side, book) {
  $('ret-' + side).textContent = pct(book.retPct);
  $('ret-' + side).className = 'ret ' + (book.retPct >= 0 ? 'up' : 'down');
  $('val-' + side).textContent = fmt$(book.value);
  $('day-' + side).textContent = 'today ' + (book.dayChange >= 0 ? '+' : '−') + fmt$(Math.abs(book.dayChange)).slice(1);
  $('day-' + side).className = 'day ' + (book.dayChange >= 0 ? 'up' : 'down');
}

function positions(el, book, topN) {
  const rows = book.positions.map(p => {
    const gl = p.entryPrice ?? p.baselinePrice;
    const glp = gl ? (p.price / gl - 1) * 100 : 0;
    return `<tr><td class="sym">${p.symbol}${p.stale ? ' ·' : ''}</td><td>${p.shares}</td>
      <td>${fmt$(p.price)}</td><td>${fmt$(p.value)}</td>
      <td class="${glp >= 0 ? 'up' : 'down'}">${pct(glp)}</td></tr>`;
  });
  const head = `<tr><th>Sym</th><th>Qty</th><th>Price</th><th>Value</th><th>G/L</th></tr>`;
  const cashRow = `<tr><td class="sym">CASH</td><td></td><td></td><td>${fmt$(book.cash)}</td><td></td></tr>`;
  const render = n => { el.innerHTML = `<table>${head}${rows.slice(0, n).join('')}${cashRow}</table>` +
    (rows.length > n ? `<div class="more">▾ show all ${rows.length} positions</div>` : '');
    el.querySelector('.more')?.addEventListener('click', () => render(rows.length)); };
  render(topN);
}

function race(history) {
  const c = $('race'), dpr = devicePixelRatio || 1;
  const W = c.clientWidth, H = 120; c.width = W * dpr; c.height = H * dpr;
  const x = c.getContext('2d'); x.scale(dpr, dpr);
  const all = history.flatMap(h => [h.zach, h.claude]);
  const min = Math.min(...all, 0) - .3, max = Math.max(...all, 0) + .3;
  const X = i => 8 + i / Math.max(history.length - 1, 1) * (W - 16);
  const Y = v => H - 10 - (v - min) / (max - min) * (H - 20);
  x.strokeStyle = '#232c42'; x.beginPath(); x.moveTo(8, Y(0)); x.lineTo(W - 8, Y(0)); x.stroke();
  for (const [key, color] of [['zach', '#5b9dff'], ['claude', '#d9822b']]) {
    x.strokeStyle = color; x.lineWidth = 2.5; x.beginPath();
    history.forEach((h, i) => i ? x.lineTo(X(i), Y(h[key])) : x.moveTo(X(i), Y(h[key])));
    x.stroke();
    const last = history[history.length - 1];
    x.fillStyle = color; x.beginPath(); x.arc(X(history.length - 1), Y(last[key]), 4, 0, 7); x.fill();
  }
}

function tradeLog(trades) {
  $('trades').innerHTML = trades.trades.slice().reverse().map(t => `
    <div class="trade"><div class="h"><span class="${t.side === 'BUY' ? 'buy' : 'sell'}">${t.side}</span>
      ${t.shares} ${t.symbol} @ ${fmt$(t.price)} <span style="color:var(--dim)">· ${t.ts.slice(0, 10)}</span></div>
      <div class="r">${t.reason}</div></div>`).join('');
}

load().then(({ snapshot, trades, history }) => {
  $('asof').textContent = 'as of ' + new Date(snapshot.asOf).toLocaleString();
  fighter('zach', snapshot.zach); fighter('claude', snapshot.claude);
  const lead = snapshot.zach.retPct >= snapshot.claude.retPct ? 'zach' : 'claude';
  $('f-' + lead).classList.add('leader');
  positions($('pos-claude'), snapshot.claude, 10);
  positions($('pos-zach'), snapshot.zach, 10);
  race(history); tradeLog(trades);
}).catch(e => { $('asof').textContent = 'failed to load data: ' + e.message; });
if (!window.__DATA__) setTimeout(() => location.reload(), 5 * 60 * 1000);
</script>
